# Site Configuration

# Theme, mapped to the directory: ./theme/xxxx
theme: default

# HTML Language setting
lang: "en"

# Plugins, implemented in ./plugins/PLUGIN_NAME
# Use {{ vars.PLUGIN_NAME }} in the settings below

# The output of the plugin can be used below, e.g., {{vars.GithubRepoStarsCountPlugin}}
plugins:

# Google Analytics tracking id
google_analytics_id:

# HTML Title
title: "Niki's"

# Avatar image path
avatar: ""

# Name section text
name: "Niki"

# Tagline section text
tagline: >-
    Media artist Niki Scheijen / Nikilia

# List of links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# text: The displayed text for the link
# title: The url title
# url: The URL of the link
# alt: Alternative text for accessibility
# target: `_blank` opens in a new tab, `_self` opens in the same frame
links:
  - link:
      icon: "<i class="fa-solid fa-globe"></i>"
      text: "Website - Niki Scheijen"
      url: "https://nikischeijen.nl/"
      alt: ""
      title: "Niki's website"
      target: "_blank"
  - link:
      icon: "<i class="fa-brands fa-youtube"></i>"
      text: "DGTL Academy - Class of 2026"
      url: "https://www.youtube.com/watch?v=idMs8bURK1g"
      alt: ""
      title: "DGTL Academy - Class of 2026"
      target: "_blank"
 


# List of social media links
# icon: Use Font Awesome icons (https://fontawesome.com/search?o=r&m=free)
# title: The url title
# url: The URL of the social media link
# alt: Alternative text for accessibility
# target: _blank opens in a new tab, _self opens in the same frame
socials:

  - social:
      icon: "fa-brands fa-linkedin"
      url: "https://www.linkedin.com/in/nikischeijen/"
      title: "Niki's LinkedIn"
      alt: "Niki's LinkedIn"
      target: "_blank"
  - social:
      icon: "fa-brands fa-instagram"
      url: "https://www.instagram.com/n1k1l1a/"
      title: "Instagram"
      alt: "Niki's Instagram"
      target: "_blank"
  - social:
      icon: "fa-solid fa-envelope"
      url: "mailto:zhgchgli@gmail.com"
      title: "Email: mail@nikischeijen.nl"
      alt: "mail@nikischeijen.nl"
      target: "_blank"

# Footer text
footer: >
    Hi there! Follow me on Medium or GitHub, or stay connected on Instagram or LinkedIn.

